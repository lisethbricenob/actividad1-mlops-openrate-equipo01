  #   cmd: python src/train.py
  #   deps:
  #     - src/train.py
  #     - ${preprocess.processed_dir}/train.csv
  #     - ${preprocess.processed_dir}/test.csv
  #   params:
  #     - train.seed
  #   outs:
  #     - ${train.models_dir}
